<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo_Let</title>
</head>
<body>

    <h1>Exemplo Let</h1>
      <label for="">Digite um número para multiplicar por dois: </label>
      <input type="number" id="multiplicar" >

      <button onclick="multiplicar()">Multiplicar</button>


      <p id="resultado"></p>

      <script>

        function multiplicar(){

            let numero = document.getElementById("multiplicar").value;
            numero = numero * 2;


            document.getElementById("resultado").innerHTML="A multiplicação resultou em: " + numero;
            window.alert("Parábens o resultado foi de: " + numero)
            console.log("Parábens o resultado foi de: " + numero)

        }
      </script>

</body>
</html>
