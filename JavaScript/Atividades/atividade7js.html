<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 18</title>
</head>
<body>
<h1> Atividade 18</h1>


<label for="">Digite o primeiro número: </label>
<input type="number" id="num1">
<label for="">Digite o segundo número: </label>
<input type="number" id="num2">

<button onclick="soma()">Clique</button>

<p id="result"></p>

<script>
    function soma (){

        let num1 = parseFloat(document.getElementById("num1").value);
        let num2 = Number(document.getElementById("num2").value);

    let result = num1 + num2;

    document.getElementById("result").innerHTML = "O resultado é: " + result;
    window.alert("Parábens o resultado é: " + result)
    console.log("O resultado da soma foi de: " + result)


}
</script>

    
</body>
</html>
