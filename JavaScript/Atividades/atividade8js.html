<body>
    <h1>Atividade 19 Const</h1>

    <Label>Digite seu nome: </Label>
    <input type="text" id="name">
    <Label>Digite sua idade: </Label>
    <input type="number" id="idade">

    <button onclick="nome()"> Enviar</button>
    <p id="saida"></p>

    <script>
        const armazen = " Foram armazenados no sistema "
        function nome(){
            let name = document.getElementById("name").value;
            let idade = document.getElementById("idade").value;
            document.getElementById("saida").innerHTML = "parabéns " + name + " seu nome e idade " + armazen;
            window.alert("parabéns sua idade é de: " + idade);
            console.log("parabéns sua idade é de: " + idade);

        }

    </script>
